---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: policysets.policy.open-cluster-management.io
spec:
  group: policy.open-cluster-management.io
  names:
    kind: PolicySet
    listKind: PolicySetList
    plural: policysets
    shortNames:
    - plcset
    singular: policyset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.compliant
      name: Compliance state
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: >-
          PolicySet is the schema for the policysets API. A policy set is a logical grouping of policies
          from the same namespace. The policy set is bound to a placement resource and applies the
          placement to all policies within the set. The status reports the overall compliance of the set.
        properties:
          apiVersion:
            description: >-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: >-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PolicySetSpec defines the group of policies to be included
              in the policy set.
            properties:
              description:
                description: Description is the description of this policy set.
                type: string
              exclusions:
                description: >-
                  Exclusions lists policies that should not be propagated to specific managed clusters
                  through this PolicySet's placement binding. Other policies in the PolicySet and other
                  clusters bound to the PolicySet are not affected.
                items:
                  description: >-
                    PolicySetExclusion defines a policy in the set that should not be propagated to
                    specific managed clusters while keeping the PolicySet association intact.
                  properties:
                    clusterNames:
                      description: ClusterNames is a list of managed cluster names
                        where the policy should not be propagated.
                      items:
                        description: NonEmptyString is a string that must contain
                          at least one character.
                        minLength: 1
                        type: string
                      minItems: 1
                      type: array
                    policyName:
                      description: PolicyName is the name of a policy in the PolicySet.
                      minLength: 1
                      type: string
                    reason:
                      description: Reason is an optional explanation for the exclusion.
                      type: string
                  required:
                  - clusterNames
                  - policyName
                  type: object
                type: array
              policies:
                description: Policies is a list of policy names that are contained
                  within the policy set.
                items:
                  description: NonEmptyString is a string that must contain at least
                    one character.
                  minLength: 1
                  type: string
                type: array
            required:
            - policies
            type: object
          status:
            description: PolicySetStatus reports the observed status of the policy
              set resulting from its policies.
            properties:
              compliant:
                description: Compliant reports the observed status resulting from
                  the compliance of the policies within.
                enum:
                - Compliant
                - Pending
                - NonCompliant
                type: string
              exclusions:
                description: Exclusions reports cluster-level exclusions the controller
                  has applied for policies in the set.
                items:
                  description: PolicySetStatusExclusion reports active cluster exclusions
                    observed for a policy in the set.
                  properties:
                    clusters:
                      description: Clusters lists managed cluster names where the
                        policy is excluded from propagation.
                      items:
                        description: NonEmptyString is a string that must contain
                          at least one character.
                        minLength: 1
                        type: string
                      type: array
                    policyName:
                      description: PolicyName is the name of the excluded policy.
                      minLength: 1
                      type: string
                  required:
                  - clusters
                  - policyName
                  type: object
                type: array
              placement:
                items:
                  description: >-
                    PolicySetStatusPlacement reports how and what managed cluster placement resources are attached to
                    the policy set.
                  properties:
                    placement:
                      description: >-
                        Placement is the name of the Placement resource, from the cluster.open-cluster-management.io
                        API group, that is bound to the policy.
                      type: string
                    placementBinding:
                      description: >-
                        PlacementBinding is the name of the PlacementBinding resource, from the
                        policies.open-cluster-management.io API group, that binds the placement resource to the policy
                        set.
                      type: string
                    placementRule:
                      description: >-
                        PlacementRule (deprecated) is the name of the PlacementRule resource, from the
                        apps.open-cluster-management.io API group, that is bound to the policy.
                      type: string
                  type: object
                type: array
              statusMessage:
                description: StatusMessge reports the current state while determining
                  the compliance of the policy set.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
